name: Weekly Documentation Sync

# This tells GitHub to run this script every Sunday at midnight (UTC)
# It also adds a "workflow_dispatch" so you can trigger it manually anytime.
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

# Give the action permission to push the new Markdown files back to your repo
permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Orchestrator (Scrape & Embed)
        env:
          # Pulls your Pinecone key securely from GitHub Secrets
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          python agent/orchestrator.py

      - name: Commit and Push New Markdown Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/docs/ agent/processed_urls.json frontend/src/data/targets.json
          
          # Only commit if there are actually changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Sync: Updated Documentation and Vectors" && git push)